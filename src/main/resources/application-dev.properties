# Dev profile - in-memory H2 for quick local testing
spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
youtube.api.key=dev_key
# Disable Flyway in dev because we use JPA ddl-auto to create schema in H2
spring.flyway.enabled=false
