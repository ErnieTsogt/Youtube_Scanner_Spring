version: "3.8"
services:
  mysql-db:
    image: mysql:latest
    container_name: "mysql-db"
    ports:
      - "3308:3306"
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  spring-app:
    build: .
    ports:
      - "9090:8080"
    env_file:
      - .env
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/ytScanDB
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}

  frontend:
    build: ../youtube-scanner-frontend
    container_name: "youtube-scanner-frontend"
    ports:
      - "3000:3000"
    depends_on:
      - spring-app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
